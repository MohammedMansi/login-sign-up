<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="loginandregester.css">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>
<body>
    <!--master Div all in conent-->
    <div class="wrapper">
        <!--This spans for chart-->
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>
        <!--this div for login form-->
        <div class="form-box login">
            <h2 class="animation" style="--i:0 ; --j:17">Login</h2>
            <form action="#">
                <div class="input-box animation" style="--i:1 ; --j:18">
                    <input type="text" required>
                    <label>Username</label>
                    <i class="bxf bx-user"></i>
                </div>
                <div class="input-box animation" style="--i:2 ; --j:19">
                    <input type="password" required>
                    <label>Password</label>
                    <i class="bxf bx-eye-slash toggle-pass" style="cursor:pointer;"></i>
                </div>
                <button class="btn animation" style="--i:3 ; --j:20" type="submit">Login</button>
                <div class="logreg-link animation" style="--i:4 ; --j:21">
                    <p>Don't have an account? <a href="#" class="register-link">Sign Up</a></p>
                </div>
            </form>
        </div>
        <div class="info-text login">
            <h2 class="animation" style="--i:0; --j:17">Welcome Back!</h2>
            <p class="animation" style="--i:1; --j:18">Lorem, ipsum dolor sit amet consectetur adipisicing.</p>
        </div>
        <div class="form-box register">
            <h2 class="animation" style="--i:17 ; --j:0">Sign Up</h2>
            <form action="#">
                <div class="input-box animation" style="--i:18 ; --j:1">
                    <input type="text" required>
                    <label>Username</label>
                    <i class="bxf bx-user"></i>
                </div>
                <div class="input-box animation" style="--i:19 ; --j:2">
                    <input type="email" required >
                    <label>Email</label>
                    <i class="bxf bx-at"></i>
                </div>
                <div class="input-box animation" style="--i:20 ; --j:3">
                    <input type="password" required>
                    <label>Password</label>
                    <i class="bxf bx-eye-slash toggle-pass" style="cursor:pointer;"></i>
                </div>
                <button class="btn animation" style="--i:21 ; --j:4" type="submit">Sign Up</button>
                <div class="logreg-link animation" style="--i:22 ; --j:5">
                    <p>Already have an account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
        <div class="info-text register">
            <h2 class="animation" style="--i:17; --j:0">Welcome Back!</h2>
            <p class="animation" style="--i:18; --j:1">Lorem, ipsum dolor sit amet consectetur adipisicing.</p>
        </div>
    </div>
    <script src="loginregister.js"></script>
</body>
</html>
